<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Ergebnisverwaltung</title>
    <link rel="stylesheet" href="admin-ergebnisse.css">
    <script src="/admin-ergebnisse.js"></script>
</head>

<body>
    
<header>
    <h1>Ergebnisse bearbeiten app12</h1>
<div class="button-container">
    <button id ="Button1" onclick="saveAll()">ALLE Ergebnisse speichern</button>
    <button id ="Button2" onclick="window.location.href='admin_dashboard.html'">zurück zum admin dashboard</button>
    <button id ="Button3" onclick="window.location.href='index.html'">zurück zum Login</button>
 
    <p id="msg"> Meldungen</p>
</div>
</header>


<h2>Ergebnisse beendeter Spiele</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Anstoß</th>
            <th>Heim</th>
            <th>Gast</th>
            <th>Tore Heim</th>
            <th>Tore Gast</th>
        </tr>
    </thead>
    <tbody id="ergTable"></tbody>
</table>





<script>
// Scripts 
async function meldungAn(msg,txt,color) {
    const msgEl = document.getElementById(msg);
    msgEl.style.color = color;
    msgEl.innerText = txt;
    msgEl.style.fontWeight = "bold";
}




let spiele = [];

// -------------------------------------------------------------
// BEENDETE SPIELE LADEN
// -------------------------------------------------------------
async function loadErgebnisse() {
    const res = await fetch("/api/spiele/beendet");
    spiele = await res.json();

    const tbody = document.getElementById("ergTable");
    tbody.innerHTML = "";

    spiele.forEach(s => {
        tbody.innerHTML += `
            <tr>
                <td>${s.id}</td>
                <td>${s.spielbeginn_formatiert}</td>
                <td>${s.heim_name}</td>
                <td>${s.gast_name}</td>
                <td><input id="home_${s.id}" type="number" min="0" value="${s.heimtore ?? ""}"></td>
                <td><input id="gast_${s.id}" type="number" min="0" value="${s.gasttore ?? ""}"></td>
            </tr>
        `;
    });
}

// -------------------------------------------------------------
// ALLE SPEICHERN
// -------------------------------------------------------------
async function saveAll() {
    const updates = spiele.map(s => ({
        id: s.id,
        heimtore: Number(document.getElementById("home_" + s.id).value),
        gasttore: Number(document.getElementById("gast_" + s.id).value)
    }));

    const msg = document.getElementById("msg");
    msg.style.color = "blue";
    msg.innerText = "Speichern läuft...";

    try {
        const res = await fetch("/api/spiele/beendet/update", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(updates)
        });

        const json = await res.json();
        console.log("SERVER ANTWORT:", json);

        msg.style.color = "green";
        msg.innerText = "Ergebnisse erfolgreich gespeichert!";

        await loadErgebnisse();

        setTimeout(() => msg.innerText = "", 5000);

    } catch (err) {
        msg.style.color = "red";
        msg.innerText = "Fehler beim Speichern!";
        console.error(err);
    }
}

// -------------------------------------------------------------
// AUTOMATISCH BEIM LADEN
// -------------------------------------------------------------
document.addEventListener("DOMContentLoaded", () => {
    loadErgebnisse();
});
</script>

</body>
</html>
