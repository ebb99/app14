<!DOCTYPE html>
<html lang="de">
<head>

</head>
<body>
<header>
    <h1>spiele_web ergänzen</h1>
    <button onclick="window.location.href='admin_dashboard.html'">zurück zum admin dashboard</button> 
</header>

<main>
    <section id="spalte1">

    </section>

   <section id="spalte2">

        <datalist id="gruppenliste"></datalist>
    </div>
        <h3>spiele_web</h3>
    <table class="spiele-tabelle">

            <tr>

            <!-- Hier fügt JavaScript die Zeilen ein -->
        </tbody>
    </table>
    </section>

   <section id="spalte3">
        <h3>spiele_aktuell</h3>

        <thead>
            <tr>
                <th>Spieltag</th>
                <th>Gruppe</th>

                <th>Anstoss</th>

            <!-- Hier fügt JavaScript die Zeilen ein -->

</main>

</html>
