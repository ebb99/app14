<section id="spalte1" >
<div class="gruppen-verwaltung">
    <h2>⚙️ Drag & Drop Gruppenverwaltung</h2>

    <!-- ➕ Neue Gruppe hinzufügen -->
    <div class="add-box" style="margin-bottom: 15px;">
        <input type="text" id="neuerGruppenNameInput" placeholder="Neue Gruppe eingeben...">
        <button class="button" id="gruppeHinzufuegenBtn">Hinzufügen</button>
    </div>

    <!-- Die Drag-and-Drop Liste -->
    <ul id="gruppenSortierenListe" style="list-style: none; padding: 0;"></ul>
</div>
</section>

    <section id="spalte2">
        <h2>Vereine</h2>

    <div class="zeile1">
        <input type="text" id="vereinInput" placeholder="Vereinsname neu...">
        <button id="saveVerein">Speichern</button>
    </div>

    <div class="zeile1">
        <input type="text" id="logoInput" class="form-control" placeholder="Quellcode / URL des Logos eingeben:">
    </div>

    <div class="zeile1">
        <p>Alle Vereine:</p>
         <select  id="allevereine" placeholder="alle Vereine"></select>
    </div>

    <div class="zeile1">
        <input list="vereineList" id="vereineselect" placeholder="Verein suchen...">
        <datalist id="vereineList"></datalist>
        <button id="deleteVerein">Löschen</button>
    </div>



  <h2>Gruppen</h2>
     </div class=zeile1">
        <input type="text" id="gruppeInput"  placeholder="Gruppenname neu....">
        <button id="saveGruppe">Gruppe speichern</button>
    </div>

    <div class="zeile1">
        <p>Alle Gruppen:</p>
        <select abc  id="allegruppen" placeholder="alle Spielgruppen"></select>
    </div>

    <div class="zeile1">
        <input list="gruppenliste" id="gruppenSelect" placeholder="Gruppe zum Löschen wählen">
        <datalist id="gruppenliste"></datalist>
        <button id="deleteGruppe">Gruppe löschen</button>
    </div>
    
    </section>

    <section id="spalte3">
        <h2>Spiel anlegen</h2>

        <div class="spiel-zeile">
            <select class="form-control" id="gruppeSelect" placeholder="Spielgruppe"></select>
            <input type="datetime-local" id="anstosszeitInput" class="form-control" placeholder="Anstoßzeit">
            <input list="vereineList" id="heimInput" placeholder="Verein suchen...">
            <input list="vereineList" id="gastInput" placeholder="Verein suchen...">
            <button id="saveSpiel">Spiel anlegen</button>
        </div>
        <hr>

   
    <h2>Spiele Übersicht</h2>

    <div class="spiel-zeile">  
        <select id="spieleSelect" class ="spiel-zeile"></select>
        <button id="deleteSpiel">Spiel löschen</button>
    </div>
</section>

<section id="spalte4">      

<h2>Benutzerverwaltung</h2>
<form id="userForm">
    <input type="hidden" id="userId">

    <input id="userName" placeholder="Name">
    <input id="userPassword" type="password" placeholder="Passwort">
    
<select id="userRole">
    <option value="tipper">Tipper</option>
    <option value="admin">Admin</option>
    <option value="familie">Familie</option>
    <option value="freund">Freund</option>
</select>

    <button type="submit">Speichern</button>
</form>


<table border="0">
    <thead>
        <tr>
            <th>Name</th>
            <th>Rolle</th>
            <th>Aktion</th>
        </tr>

</table>
